name: Deploy EdgeOne Static

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy to EdgeOne Pages
        run: npx edgeone pages deploy ./ -n xingzhi-travel -t "$EDGEONE_API_TOKEN" -e production
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
