name: Deploy EdgeOne Static

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check static files
        run: |
          pwd
          ls -la
          test -f index.html
          test -f 404.html
          test -f favicon.svg
          test -f robots.txt
      - name: Check EdgeOne CLI
        run: npx edgeone --version
      - name: Deploy to EdgeOne Pages
        run: npx edgeone pages deploy ./ -n xingzhi-travel -t "$EDGEONE_API_TOKEN" -e production
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
